name: Capstone CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 1. SSH into your server and update the backend
      - name: Deploy to Backend Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}      # Make sure this is your NEW Public IP
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}    # Your .pem file content
          script: |
            # Navigate to the verified backend folder
            cd /home/ubuntu/capstone-app/backend
            
            # Pull latest code
            git pull origin main
            
            # Install dependencies
            npm install
            
            # Restart the app (if it exists) OR start it for the first time
            # We use server.js because we verified that is your filename
            pm2 restart backend || pm2 start server.js --name "backend"
            
            # Save PM2 state so it survives a reboot
            pm2 save

      # 2. Configure AWS Credentials
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # 3. Trigger ASG Instance Refresh (Keep this if you use an Auto Scaling Group)
      - name: Trigger ASG Instance Refresh
        run: |
          aws autoscaling start-instance-refresh \
            --auto-scaling-group-name capstone-asg \
            --preferences '{"MinHealthyPercentage": 50}'
        continue-on-error: true # Prevents the whole pipeline from failing if ASG isn't set up

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Build Frontend
        run: |
          cd frontend
          npm install
          # NOTE: Ensure VITE_API_URL points to your production URL
          npm run build
        env:
          VITE_API_URL: ""

      - name: Deploy to S3 (Website Bucket)
        uses: jakejarvis/s3-sync-action@master
        with:
          args: --delete
        env:
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_FRONTEND_BUCKET }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SOURCE_DIR: 'frontend/dist'

      # 4. Clear the CloudFront Cache
      - name: Invalidate CloudFront Cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DIST_ID }} \
            --paths "/*"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}